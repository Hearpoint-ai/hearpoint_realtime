name: Eval

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke (no weights)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy soundfile sounddevice pyyaml resampy resemblyzer \
                      asteroid-filterbanks espnet

      - name: Validate config import
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src/realtime')
          from realtime_inference import Config
          Config.from_yaml('src/realtime/config.yaml')
          print('Config loaded OK')
          "

      - name: Assert --embedding and --test-file in --help
        run: |
          output=$(python src/realtime/realtime_inference.py --help 2>&1)
          echo "$output"
          echo "$output" | grep -q -- '--embedding' \
            || (echo "FAIL: --embedding missing from --help" && exit 1)
          echo "$output" | grep -q -- '--test-file' \
            || (echo "FAIL: --test-file missing from --help" && exit 1)
          echo "Help flags OK"

  eval:
    name: Eval (with weights)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy soundfile sounddevice pyyaml resampy \
                      resemblyzer asteroid-filterbanks espnet matplotlib

      - name: Build eval fixture
        run: make make-fixture PYTHON=python EMBEDDING_MODEL=resemblyzer

      - name: Run eval-fast
        continue-on-error: true
        run: make eval-fast PYTHON=python

      - name: Validate eval report status
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          reports = sorted(glob.glob("reports/eval/*.json"), key=os.path.getmtime)
          if not reports:
              print("::error::No eval report JSON found in reports/eval/.")
              sys.exit(1)

          report_path = reports[-1]
          with open(report_path, "r", encoding="utf-8") as f:
              report = json.load(f)

          status = report.get("status")
          failed = report.get("failed_thresholds", [])

          print(f"Eval report: {report_path}")
          print(f"status={status}")
          print(f"failed_thresholds={failed}")

          if status != "pass":
              failed_str = ", ".join(failed) if failed else "(none listed)"
              print(f"::error::Eval failed. Thresholds: {failed_str}")
              sys.exit(1)

          print("Eval passed all thresholds.")
          PY

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval/
