name: hearpoint-realtime
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy<2.0.0  # Crucial: Pins NumPy to the 1.x series
  - pysoundfile
  - pip:
      # PyTorch must be installed separately from NVIDIA's Jetson index.
      - asteroid-filterbanks
      - resampy
      - resemblyzer
      - pysofaconventions
      - espnet
      - sounddevice