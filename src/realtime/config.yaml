# Real-time TFGridNet Inference Configuration

# =============================================================================
# SPEAKER EMBEDDING
# =============================================================================
# Path to speaker embedding .npy file (required)
# e.g., "/path/to/speaker_embedding.npy"
embedding: /Users/himanshu/Documents/Github/Capstone/hearpoint_realtime/media/enrollments/63400403-12da-4aa8-894e-615f29a78dd3.npy  

# =============================================================================
# AUDIO CONFIGURATION
# =============================================================================
audio:
  # Sample rate in Hz
  sample_rate: 16000

  # Chunk size in samples
  chunk_size: 128

  # Input device index (null for system default)
  # Run with --list-devices to see available devices
  input_device: null

  # Output device index (null for system default)
  output_device: null

  # Number of input channels (1 for mono mic)
  input_channels: 2

  # Number of output channels (null for auto-detect, 1 for mono, 2 for stereo)
  output_channels: 2

  # Number of chunks to buffer for input (higher = more stable, more latency)
  buffer_size_chunks: 4


# =============================================================================
# DEBUG OPTIONS
# =============================================================================
debug:
  # Enable verbose debug logging (prints input/output stats per chunk)
  verbose: false

  # Bypass the model entirely - pass audio through unchanged
  # Useful for testing audio I/O pipeline
  passthrough: false

  # Directory to save debug audio files (debug_input.wav, debug_output.wav)
  # Set to null to disable, or a path like "./debug_audio/"
  save_dir: null
