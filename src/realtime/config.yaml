# Real-time Inference Configuration

embedding: media/si_sdr_fixture/enrollment.npy  # path to the enrolled speaker's embedding file
embedding_model: resemblyzer  # model used to generate speaker embeddings

audio:
  sample_rate: 16000       # audio sample rate in Hz; must match your mic
  chunk_size: 128          # samples per processing chunk; lower = less latency, higher = more stable
  input_device: null       # mic device index (run `make list-devices`); null = system default
  output_device: null      # output device index; null = system default
  input_channels: 2        # mic input channels; 1 = mono, 2 = stereo
  output_channels: 2       # output channels; null = auto-detect
  buffer_size_chunks: 4    # input buffer depth; higher = more stable but more latency
  output_gain_passthrough: 1.0  # volume multiplier in passthrough mode; 1.0 = unity, 2.0 = +6dB
  output_gain_isolation: 2.0    # volume multiplier in isolation mode; boost if speaker sounds quiet
  input_gain: 2.0          # amplifies input before model inference; boost if mic signal is weak

debug:
  verbose: false           # print input/output levels each chunk
  passthrough: false       # skip the model entirely and pass audio through unchanged
  save_dir: null           # save input/output as WAV files on exit; null = disabled

optimization:
  use_torch_compile: false        # wrap model in torch.compile; may improve speed but not recommended on MPS
  use_coreml: true                # use CoreML model for Apple Neural Engine acceleration; faster on Apple Silicon
  coreml_model_path: checkpoints/tfgridnet_streaming.mlpackage  # path to the exported CoreML model package

name_detection:
  enabled: true            # automatically toggle passthrough when the target word is detected
  model_path: src/models/vosk-model-small-en-us-0.15  # path to the Vosk speech recognition model directory
  target_word: fire        # spoken word that toggles passthrough mode

enrollment:
  use_beamformer: false     # beamform stereo mic before enrollment; improves embedding quality for binaural input

spectral_subtraction:
  enabled: true           # apply noise removal after the model in isolation mode
  noise_profile_path: media/noise_captures/noise.wav # noise-only WAV used to build the subtraction profile
  sample_rate: 16000       # resample noise profile to this rate before processing
  n_fft: 512               # FFT size for spectral analysis; larger = finer frequency resolution
  hop_length: 128          # STFT hop size; keep equal to chunk_size for realtime alignment
  win_length: 512          # STFT window size; affects frequency/time resolution tradeoff
  alpha: 0.95             # reserved for adaptive profile updates

auto_reset:
  enabled: true
  input_floor: 0.01           # minimum input level to consider audio "active"
  ratio_threshold: 0.15        # output/input ratio below this triggers a reset; lower = more sensitive
  consecutive_chunks: 50      # how many consecutive suppressed chunks before resetting (~800ms)
  cooldown_chunks: 250         # chunks to wait before allowing another reset (~2s)
  activity_window_chunks: 375  # lookback window for checking recent model activity (~3s)
  activity_threshold: 0.15     # output/input ratio above this means the model was working; prevents false resets

noise_gate:
  enabled: true
  energy_threshold: 0.01    # output peak below this closes the gate; lower = more silence let through
  attack_chunks: 2           # chunks to ramp up when gate opens; lower = faster response (~16ms)
  hold_chunks: 50            # chunks to stay open between words; prevents choppy cutoffs (~120ms)
  release_chunks: 10         # chunks to ramp down when gate closes (~80ms)
  smooth_coeff: 0.3          # gate envelope smoothing; 0 = instant response, 1 = frozen

logging:
  enabled: false            # write per-second stats and session summary to JSONL
  log_dir: logs/realtime   # directory where log files are saved

test:
  enabled: false           # run on a file instead of live audio
  input_file: media/si_sdr_fixture/mixture.wav        # input WAV to process
  output_dir: reports/eval/output_audio  # directory to save the enhanced output WAV
  reference_file: media/si_sdr_fixture/reference.wav  # clean reference WAV for SI-SDR scoring; null = skip
  report_dir: reports/eval # directory for timestamped eval reports; null = disabled
  threshold_profile: dev   # which profile from thresholds.yaml to check against; null = skip
  warmup_chunks: 10        # chunks excluded from metrics to avoid startup artifacts
  generate_plots: true     # generate spectrogram and performance plots

controller:
  1: esc                     #top left
  2: decrease_gain           #top middle
  3: increase_gain           #top right
  t: enroll                  #bottom left
  e: name                    #bottom middle
  n: toggle_passthrough      #bottom right
  7: prev_speaker            #knob left
  8: select                  #knob button
  9: next_speaker            #knob right
