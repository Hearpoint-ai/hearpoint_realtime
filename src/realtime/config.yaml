# Real-time TFGridNet Inference Configuration

# =============================================================================
# SPEAKER EMBEDDING
# =============================================================================
# Path to speaker embedding .npy file (required)
# e.g., "/path/to/speaker_embedding.npy"
embedding: media/enrollments/Derron_enrolment.npy

# Speaker embedding model ID used for enrollment and cosine eval checks
# Allowed: resemblyzer, tfgridnet
embedding_model: resemblyzer

# =============================================================================
# AUDIO CONFIGURATION
# =============================================================================
audio:
  # Sample rate in Hz
  sample_rate: 16000

  # Chunk size in samples
  chunk_size: 128

  # Input device index (null for system default)
  # Run with --list-devices to see available devices
  input_device: null

  # Output device index (null for system default)
  output_device: null

  # Number of input channels (1 for mono mic, 2 for stereo mic)
  input_channels: 2

  # Number of output channels (null for auto-detect, 1 for mono, 2 for stereo)
  output_channels: 2

  # Number of chunks to buffer for input (higher = more stable, more latency)
  buffer_size_chunks: 4

  # Output gain multiplier (1.0 = unity, 2.0 = +6dB, 0.5 = -6dB)
  output_gain: 3.0


# =============================================================================
# DEBUG OPTIONS
# =============================================================================
debug:
  # Enable verbose debug logging (prints input/output stats per chunk)
  verbose: false

  # Bypass the model entirely - pass audio through unchanged
  # Useful for testing audio I/O pipeline
  passthrough: false

  # Directory to save debug audio files (debug_input.wav, debug_output.wav)
  # Set to null to disable, or a path like "./debug_audio/"
  save_dir: null


# =============================================================================
# OPTIMIZATION
# =============================================================================
optimization:
  # Wrap model in torch.compile(mode="reduce-overhead") for graph optimization
  # Falls back gracefully on unsupported backends (e.g. MPS)
  use_torch_compile: false

  # Use pre-exported CoreML model (.mlpackage) for ANE-accelerated inference.
  # Export first: python src/tools/export_coreml.py
  # Then set use_coreml: true and point coreml_model_path at the output file.
  use_coreml: true
  coreml_model_path: checkpoints/tfgridnet_streaming.mlpackage  # e.g. "checkpoints/tfgridnet_streaming.mlpackage"


# =============================================================================
# NAME DETECTION (Vosk)
# =============================================================================
# When enabled, a separate thread listens for a target word (e.g. a name) in the
# same microphone stream and triggers passthrough mode
name_detection:
  enabled: true
  # Path to Vosk model directory (relative to repo root or absolute)
  model_path: src/models/vosk-model-small-en-us-0.15
  target_word: toggle


# =============================================================================
# PERFORMANCE LOGGING
# =============================================================================
# When enabled, per-second snapshots and a session summary are written to a
# JSONL file in log_dir. Logging uses a background thread queue and adds zero
# latency to the audio processing path.
logging:
  enabled: true
  log_dir: logs/realtime


# =============================================================================
# FILE-BASED TEST MODE
# =============================================================================
test:
  # Enable file-based test mode (process a file instead of live audio)
  enabled: false

  # Path to input audio file
  input_file: media/mixtures/derron_mubashir.wav

  # Path to output audio file (null = auto-generated from input filename)
  output_file: null
