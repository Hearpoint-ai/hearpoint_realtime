# Real-time Inference Configuration

embedding: media/si_sdr_fixture/enrollment.npy  # e.g. "/path/to/speaker.npy" — speaker enrollment file
embedding_model: resemblyzer  # resemblyzer | tfgridnet — model used for enrollment and cosine eval

audio:
  sample_rate: 16000       # e.g. 16000 — Hz
  chunk_size: 128          # e.g. 128 — samples per processing chunk
  input_device: null       # e.g. 1 — device index (run --list-devices); null = system default
  output_device: null      # e.g. 2 — device index; null = system default
  input_channels: 2        # e.g. 2 — 1 for mono mic, 2 for stereo
  output_channels: 2       # e.g. 2 — null = auto-detect
  buffer_size_chunks: 4    # e.g. 4 — input buffer depth; higher = more stable, more latency
  output_gain: 3.0         # e.g. 1.0 — multiplier; 1.0 = unity, 2.0 = +6dB
  input_gain: 4.0          # e.g. 1.0 — multiplier applied to input audio before model inference

debug:
  verbose: false           # e.g. true — prints input/output stats per chunk
  passthrough: false       # e.g. true — bypasses model, passes audio through unchanged
  save_dir: null           # e.g. "./debug_audio/" — saves debug_input.wav + debug_output.wav; null = disabled

optimization:
  use_torch_compile: false        # e.g. true — wraps model in torch.compile(reduce-overhead); not recommended on MPS
  use_coreml: true                # e.g. true — use pre-exported CoreML model for ANE acceleration
  coreml_model_path: checkpoints/tfgridnet_streaming.mlpackage  # e.g. "checkpoints/tfgridnet_streaming.mlpackage"

name_detection:
  enabled: true            # e.g. true — listen for target word and toggle passthrough mode
  model_path: src/models/vosk-model-small-en-us-0.15  # e.g. "src/models/vosk-model-small-en-us-0.15" — Vosk model dir
  target_word: toggle      # e.g. "derron" — spoken word that triggers toggle

enrollment:
  use_beamformer: false     # e.g. true — beamform binaural audio before embedding (beamformer_resemblyzer); false = plain resemblyzer

spectral_subtraction:
  enabled: true           # e.g. true — apply spectral subtraction after TFGridNet in isolation mode
  noise_profile_path: media/noise_captures/noise.wav # e.g. "media/noise_captures/noise_capture.wav" — noise-only WAV used to estimate noise profile
  sample_rate: 16000       # e.g. 16000 — resample noise profile to this rate for spectral subtraction
  n_fft: 512               # e.g. 512 — STFT FFT size
  hop_length: 128          # e.g. 128 — STFT hop size (set to chunk_size for realtime)
  win_length: 512          # e.g. 512 — STFT window length
  alpha: 0.95             # e.g. 0.95 — reserved for optional adaptive profile updates

auto_reset:
  enabled: true
  input_floor: 0.01           # min input level to consider "active audio"
  ratio_threshold: 0.1        # output/input below this = suspected poisoning
  consecutive_chunks: 100      # ~800ms sustained suppression before triggering
  cooldown_chunks: 250         # ~2s cooldown after reset
  activity_window_chunks: 375  # ~3s lookback for recent output activity
  activity_threshold: 0.15     # output/input ratio above this = "model was active"

noise_gate:
  enabled: true
  energy_threshold: 0.005    # output peak below this → gate closes
  attack_chunks: 2           # ~16ms — ramp up to open
  hold_chunks: 15            # ~120ms — stay open between words
  release_chunks: 10         # ~80ms — ramp down to closed
  smooth_coeff: 0.3          # envelope smoothing (0=instant, 1=frozen)

logging:
  enabled: false            # e.g. true — write per-second snapshots + session summary to JSONL
  log_dir: logs/realtime   # e.g. "logs/realtime" — output directory for log files

test:
  enabled: false           # e.g. true — process a file instead of live audio
  input_file: media/si_sdr_fixture/mixture.wav        # e.g. "media/mixture.wav" — input audio file
  output_dir: reports/eval/output_audio  # e.g. "reports/eval/output_audio" — directory for enhanced output WAV
  reference_file: media/si_sdr_fixture/reference.wav  # e.g. "media/reference.wav" — clean ref for SI-SDR; null = skip
  report_dir: reports/eval # e.g. "reports/eval" — timestamped JSON eval reports; null = disabled
  threshold_profile: dev   # e.g. "dev" — profile from thresholds.yaml to check against; null = skip
  warmup_chunks: 10        # e.g. 10 — chunks excluded from metric aggregation
  generate_plots: true     # e.g. true — generate spectrogram, RTF distribution, SI-SDRi vs SNR plots (Requires embedding path to be si_sdr_fixture)

controller:
  1: prev_speaker            #top left
  2: esc                     #top middle
  3: enroll                  #top right
  t: next_speaker            #bottom left
  e: name                    #bottom middle
  n: select                  #bottom right
  7: decrease_gain           #knob left
  8: toggle_passthrough      #knob button
  9: increase_gain           #knob right 